<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guard Call 🛡️</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      color: white;
      transition: background 0.6s ease;
      padding: 20px;
    }

    body.safe    { background: #0d2b1a; }
    body.warning { background: #2b2200; }
    body.danger  { background: #2b0a0a; }
    body.alert   { background: #1a0000; animation: pulse-bg 1s infinite alternate; }

    @keyframes pulse-bg {
      from { background: #1a0000; }
      to   { background: #3a0000; }
    }

    /* ── Shield icon ── */
    .shield {
      font-size: 72px;
      margin-bottom: 12px;
      transition: transform 0.3s;
    }
    body.alert .shield { animation: shake 0.4s infinite; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }

    /* ── Title ── */
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 32px; opacity: 0.9; }

    /* ── Score ring ── */
    .score-ring {
      position: relative;
      width: 180px;
      height: 180px;
      margin-bottom: 24px;
    }
    .score-ring svg { width: 180px; height: 180px; transform: rotate(-90deg); }
    .score-ring .track { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 12; }
    .score-ring .bar   {
      fill: none; stroke: #22c55e; stroke-width: 12;
      stroke-linecap: round;
      stroke-dasharray: 502;
      stroke-dashoffset: 502;
      transition: stroke-dashoffset 0.5s ease, stroke 0.5s ease;
    }
    .score-label {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .score-pct  { font-size: 48px; font-weight: 800; }
    .score-text { font-size: 14px; opacity: 0.6; margin-top: 2px; }

    /* ── Level badge ── */
    .level-badge {
      font-size: 22px; font-weight: 700; letter-spacing: 2px;
      padding: 8px 28px; border-radius: 40px;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.15);
      margin-bottom: 28px;
      text-transform: uppercase;
      transition: all 0.4s;
    }
    body.safe    .level-badge { border-color: #22c55e; color: #22c55e; }
    body.warning .level-badge { border-color: #facc15; color: #facc15; }
    body.danger  .level-badge { border-color: #f97316; color: #f97316; }
    body.alert   .level-badge { border-color: #ef4444; color: #ef4444; }

    /* ── Buttons ── */
    .btn-row { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; justify-content: center; }

    button {
      padding: 14px 28px; border: none; border-radius: 12px;
      font-size: 16px; font-weight: 600; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #btn-start { background: #22c55e; color: #000; }
    #btn-stop  { background: #ef4444; color: #fff; display: none; }
    #btn-cancel{ background: rgba(255,255,255,0.12); color: #fff; border: 1px solid rgba(255,255,255,0.2); }

    /* ── Recording indicator ── */
    .rec-dot {
      display: none; align-items: center; gap: 8px;
      font-size: 13px; opacity: 0.7; margin-bottom: 20px;
    }
    .rec-dot.active { display: flex; }
    .rec-dot .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #ef4444; animation: blink 1s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ── Info cards ── */
    .info-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      width: 100%; max-width: 500px; margin-bottom: 20px;
    }
    .info-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 14px;
    }
    .info-card .label { font-size: 11px; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .info-card .value { font-size: 15px; font-weight: 600; }
    .info-card.wide   { grid-column: 1 / -1; }

    .phrases-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .phrase-tag {
      background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.4);
      border-radius: 20px; padding: 3px 10px; font-size: 12px; color: #fca5a5;
    }

    /* ── Status / connection ── */
    .status-bar {
      font-size: 12px; opacity: 0.4; margin-top: 8px;
    }
    .status-bar.connected { opacity: 0.7; color: #22c55e; }
    .status-bar.error     { opacity: 0.9; color: #f87171; }

    /* ── History ── */
    .history-section {
      width: 100%; max-width: 500px; margin-top: 24px;
    }
    .history-title {
      font-size: 13px; opacity: 0.4; text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 10px;
    }
    .history-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; padding: 10px 14px;
      margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
    }
    .h-time  { font-size: 12px; opacity: 0.4; }
    .h-score { font-size: 14px; font-weight: 700; }
    .h-score.safe    { color: #22c55e; }
    .h-score.warning { color: #facc15; }
    .h-score.danger  { color: #f97316; }
    .h-score.alert   { color: #ef4444; }
  </style>
</head>
<body>

  <div class="shield">🛡️</div>
  <h1>Guard Call</h1>

  <!-- Score ring -->
  <div class="score-ring">
    <svg viewBox="0 0 180 180">
      <circle class="track" cx="90" cy="90" r="80"/>
      <circle class="bar"   cx="90" cy="90" r="80" id="ring-bar"/>
    </svg>
    <div class="score-label">
      <span class="score-pct" id="score-pct">—</span>
      <span class="score-text">риск</span>
    </div>
  </div>

  <div class="level-badge" id="level-badge">ожидание</div>

  <!-- Recording dot -->
  <div class="rec-dot" id="rec-dot">
    <div class="dot"></div>
    <span>запись идёт...</span>
  </div>

  <!-- Buttons -->
  <div class="btn-row">
    <button id="btn-start">🎙 Начать анализ</button>
    <button id="btn-stop">⏹ Стоп</button>
    <button id="btn-cancel">✅ Не мошенник</button>
  </div>

  <!-- Info cards -->
  <div class="info-grid" id="info-grid" style="display:none">
    <div class="info-card">
      <div class="label">Голос</div>
      <div class="value" id="voice-score">—</div>
    </div>
    <div class="info-card">
      <div class="label">Текст</div>
      <div class="value" id="text-score">—</div>
    </div>
    <div class="info-card">
      <div class="label">Язык</div>
      <div class="value" id="language">—</div>
    </div>
    <div class="info-card">
      <div class="label">Категория</div>
      <div class="value" id="category">—</div>
    </div>
    <div class="info-card wide">
      <div class="label">Транскрипт</div>
      <div class="value" id="transcript" style="font-weight:400;font-size:13px;opacity:0.8">—</div>
    </div>
    <div class="info-card wide" id="phrases-card" style="display:none">
      <div class="label">⚠️ Найденные фразы</div>
      <div class="phrases-list" id="phrases-list"></div>
    </div>
  </div>

  <div class="status-bar" id="status">нажмите «Начать анализ»</div>

  <!-- History -->
  <div class="history-section">
    <div class="history-title">История звонков</div>
    <div id="history-list"></div>
  </div>

<script>
  const WS_URL = 'ws://localhost:8000/ws/stream';
  const API_URL = 'http://localhost:8000';
  const CHUNK_MS = 3000;

  let ws = null;
  let mediaRecorder = null;
  let stream = null;

  const $ = id => document.getElementById(id);

  // ── UI helpers ──────────────────────────────────────────────────────────────

  function setLevel(level, score) {
    const pct = Math.round(score * 100);
    document.body.className = level;

    // Ring
    const circumference = 2 * Math.PI * 80; // 502.65
    const offset = circumference * (1 - score);
    const bar = $('ring-bar');
    bar.style.strokeDashoffset = offset;
    const colors = { safe: '#22c55e', warning: '#facc15', danger: '#f97316', alert: '#ef4444' };
    bar.style.stroke = colors[level] || '#aaa';

    $('score-pct').textContent = score === null ? '—' : pct + '%';

    const labels = { safe: 'безопасно', warning: 'подозрительно', danger: 'опасно', alert: '🚨 МОШЕННИК' };
    $('level-badge').textContent = labels[level] || level;
  }

  function setStatus(msg, cls = '') {
    const el = $('status');
    el.textContent = msg;
    el.className = 'status-bar ' + cls;
  }

  function updateCards(data) {
    $('info-grid').style.display = 'grid';
    $('voice-score').textContent = Math.round(data.voice_score * 100) + '%';
    $('text-score').textContent  = Math.round(data.text_score  * 100) + '%';
    $('language').textContent    = data.language === 'he' ? '🇮🇱 иврит' : data.language === 'ru' ? '🇷🇺 русский' : data.language || '—';
    $('category').textContent    = data.category || '—';
    $('transcript').textContent  = data.transcript || '—';

    const phrases = data.matched_phrases || [];
    if (phrases.length > 0) {
      $('phrases-card').style.display = 'block';
      $('phrases-list').innerHTML = phrases.map(p =>
        `<span class="phrase-tag">${p}</span>`
      ).join('');
    } else {
      $('phrases-card').style.display = 'none';
    }
  }

  // ── WebSocket ────────────────────────────────────────────────────────────────

  function connectWS() {
    ws = new WebSocket(WS_URL);

    ws.onopen  = () => setStatus('подключено к серверу', 'connected');
    ws.onerror = () => setStatus('ошибка подключения — бэкенд запущен?', 'error');
    ws.onclose = () => { ws = null; setStatus('соединение закрыто'); };

    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      setLevel(data.level, data.final_score);
      updateCards(data);

      if (data.alert_sent) {
        setStatus('🚨 Алерт отправлен родственнику!', 'error');
      }
    };
  }

  // ── Recording ────────────────────────────────────────────────────────────────

  async function startRecording() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch {
      setStatus('нет доступа к микрофону', 'error');
      return;
    }

    connectWS();
    await new Promise(r => setTimeout(r, 500)); // дать WS подключиться

    function recordChunk() {
      if (!stream) return;

      mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
      const chunks = [];

      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

      mediaRecorder.onstop = () => {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        const blob = new Blob(chunks, { type: 'audio/webm' });
        const reader = new FileReader();
        reader.onloadend = () => {
          const base64 = reader.result.split(',')[1];
          ws.send(base64);
        };
        reader.readAsDataURL(blob);
        if (stream) recordChunk(); // следующий чанк
      };

      mediaRecorder.start();
      setTimeout(() => { if (mediaRecorder?.state === 'recording') mediaRecorder.stop(); }, CHUNK_MS);
    }

    recordChunk();

    $('btn-start').style.display = 'none';
    $('btn-stop').style.display  = 'inline-block';
    $('rec-dot').classList.add('active');
  }

  function stopRecording() {
    if (mediaRecorder?.state === 'recording') mediaRecorder.stop();
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    if (ws) { ws.close(); ws = null; }

    $('btn-start').style.display = 'inline-block';
    $('btn-stop').style.display  = 'none';
    $('rec-dot').classList.remove('active');
    setLevel('safe', 0);
    $('score-pct').textContent = '—';
    $('level-badge').textContent = 'ожидание';
    setStatus('остановлено');
    loadHistory();
  }

  async function cancelAlert() {
    await fetch(`${API_URL}/cancel_alert`, { method: 'POST' });
    setStatus('алерт сброшен ✓', 'connected');
    document.body.className = '';
  }

  // ── History ──────────────────────────────────────────────────────────────────

  async function loadHistory() {
    try {
      const res  = await fetch(`${API_URL}/history`);
      const data = await res.json();
      const el   = $('history-list');

      if (!data.length) { el.innerHTML = '<div style="opacity:0.3;font-size:13px">нет записей</div>'; return; }

      el.innerHTML = data.slice(0, 5).map(row => {
        const time = new Date(row.timestamp).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        const pct  = Math.round(row.max_score * 100);
        return `
          <div class="history-item">
            <div>
              <div class="h-time">${time} · ${row.duration_sec}с</div>
              <div style="font-size:12px;opacity:0.5;margin-top:2px">${row.transcript?.slice(0, 40) || '—'}</div>
            </div>
            <div class="h-score ${row.level}">${pct}%</div>
          </div>`;
      }).join('');
    } catch { /* бэкенд не запущен */ }
  }

  // ── Init ─────────────────────────────────────────────────────────────────────

  $('btn-start').onclick  = startRecording;
  $('btn-stop').onclick   = stopRecording;
  $('btn-cancel').onclick = cancelAlert;

  setLevel('safe', 0);
  $('score-pct').textContent = '—';
  loadHistory();
</script>
</body>
</html>
